name = "peg-turner"

[pipeline]
stages = ["load", "arrange", "plate", "slice", "pack"]

[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
version = "2.3.1"
bed_type = "Textured PEI Plate"

[slicer.orca]
printer = "Bambu Lab P1S 0.4 nozzle"
process = "0.20mm Strength @BBL X1C"
filaments = ["Generic PLA @base", "Generic ASA @base", "Generic PLA-CF @base", "Generic PLA @base"]

[slicer.orca.overrides]
sparse_infill_density = "35%"
sparse_infill_pattern = "gyroid"
wall_loops = 6
brim_type = "outer_only"
brim_width = 8

[[parts]]
file = "handle_knob.step"
orient = "upside-down"
filament = 3

[[parts]]
file = "retaining_washer.step"
orient = "upside-down"
filament = 3

[[parts]]
file = "socket_body.step"
orient = "upside-down"
filament = 3

# Repack OrcaSlicer's .gcode.3mf into a Bambu P1S-printable file (local bambox).
[pack]
command = "bambox repack {sliced_3mf}"
output = "{sliced_3mf}"
docker = false
