name = "tuner-case-v2"

[pipeline]
stages = ["load", "arrange", "plate", "slice", "pack"]

[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
version = "2.3.1"
bed_type = "Textured PEI Plate"

[slicer.orca]
printer = "Bambu Lab P1S 0.4 nozzle"
process = "0.20mm Strength @BBL X1C"
filaments = ["Generic PETG @base"]

[slicer.orca.overrides]
brim_type = "outer_only"
brim_width = "8mm"
sparse_infill_pattern = "gyroid"
sparse_infill_density = "35%"

# Print-in-place clamshell leaves — exported already in print pose, so keep flat.
[[parts]]
file = "tuner_case_v2_shell_print.step"
orient = "flat"

# Slide-in tray that holds the tuners; prints on its open base.
[[parts]]
file = "tuner_case_v2_insert.step"
orient = "flat"

# Repack OrcaSlicer's .gcode.3mf into a Bambu P1S-printable file (local bambox).
[pack]
command = "bambox repack {sliced_3mf}"
output = "{sliced_3mf}"
docker = false
